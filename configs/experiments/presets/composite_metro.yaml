---
CoreConfig:
  TC_Iterations: 10
  MaxTimeS: 21600
  LocalPath: "../../"
  RemotePath: "/var/log/charon.log"
  CommandRetries: 2
  TrafficCommand: "ping -c 2 10.1.0.3"
  PrintLevel: 1
  compose_files: "./pq-strongswan/hybrid2pq-docker-compose.yml"
  Note: "network_profile__composite__metro"

# RTT=12ms -> delay_ms=6ms, jitter=2ms, loss=0.1%
Carol_Network_Config:
  Interface: eth0
  AdjustHost: carol
  Profile:
    delay_ms: 6
    jitter_ms: 2
    loss_pct: 0.1
    duplicate_pct: ""
    corrupt_pct: ""
    reorder_pct: ""
    reorder_corr_pct: ""
    rate_kbit: ""
  AddParams: ""

Moon_Network_Config:
  Interface: eth0
  AdjustHost: moon
  Profile:
    delay_ms: 6
    jitter_ms: 2
    loss_pct: 0.1
    duplicate_pct: ""
    corrupt_pct: ""
    reorder_pct: ""
    reorder_corr_pct: ""
    rate_kbit: ""
  AddParams: ""
