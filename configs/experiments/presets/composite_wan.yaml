---
CoreConfig:
  TC_Iterations: 10
  MaxTimeS: 21600
  LocalPath: "../../"
  RemotePath: "/var/log/charon.log"
  CommandRetries: 2
  TrafficCommand: "ping -c 2 10.1.0.3"
  PrintLevel: 1
  compose_files: "./pq-strongswan/hybrid2pq-docker-compose.yml"
  Note: "network_profile__composite__wan"

# RTT=105ms -> delay_ms=52.5ms, jitter=13.125ms, bidirectional loss=0.3%
Carol_Network_Config:
  Interface: eth0
  AdjustHost: carol
  Profile:
    delay_ms: 52.5
    jitter_ms: 13.125
    loss_pct: 0.3
    duplicate_pct: ""
    corrupt_pct: ""
    reorder_pct: ""
    reorder_corr_pct: ""
    rate_kbit: ""
  AddParams: ""

Moon_Network_Config:
  Interface: eth0
  AdjustHost: moon
  Profile:
    delay_ms: 52.5
    jitter_ms: 13.125
    loss_pct: 0.3
    duplicate_pct: ""
    corrupt_pct: ""
    reorder_pct: ""
    reorder_corr_pct: ""
    rate_kbit: ""
  AddParams: ""
