---
CoreConfig:
  TC_Iterations: 3
  MaxTimeS: 1800
  LocalPath: "../../perf_fault_quick/"
  RemotePath: "/var/log/charon.log"
  CommandRetries: 2
  TrafficCommand: "ping -c 2 10.1.0.2"
  PrintLevel: 1
  compose_files: "./pq-strongswan/docker-compose.yml"
  Note: "fault-quick"

Carol_TC_Config:
  Constraint1:
    Type: netem
    Constraint: delay
    Interface: eth0
    Units: ms
    SweepValues: [1, 100]
    Steps: 2
    AddParams: "loss 1% duplicate 0.5%"
