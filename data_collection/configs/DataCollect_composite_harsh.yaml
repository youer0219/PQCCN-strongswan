---
CoreConfig:
  TC_Iterations: 10
  MaxTimeS: 21600
  LocalPath: "../../"
  RemotePath: "/var/log/charon.log"
  CommandRetries: 2
  TrafficCommand: "ping -c 2 10.1.0.2"
  PrintLevel: 1
  compose_files: "./pq-strongswan/hybrid2pq-docker-compose.yml"
  Note: "network_profile__composite__harsh"

# RTT=120ms -> delay_ms=60ms, loss=2.0%
Carol_Network_Config:
  Interface: eth0
  AdjustHost: carol
  Profile:
    delay_ms: 60
    jitter_ms: ""
    loss_pct: 2.0
    duplicate_pct: ""
    corrupt_pct: ""
    reorder_pct: ""
    reorder_corr_pct: ""
    rate_kbit: ""
  AddParams: ""