---
# Template: DataCollect_SCENARIO_MODIFIER.yaml
#
# Unified network profile model:
# - Leave any profile value as empty string to mean "no limit".
# - SweepKey/SweepValues are optional; omit them for a single static profile.

CoreConfig:
  TC_Iterations: 10
  MaxTimeS: 36000
  LocalPath: "../../"
  RemotePath: "/var/log/charon.log"
  CommandRetries: 2
  TrafficCommand: "ping -c 2 10.1.0.2"
  PrintLevel: 1
  compose_files: "./pq-strongswan/hybrid2pq-docker-compose.yml"
  Note: "YOUR_TEST_SCENARIO_DESCRIPTION"

Carol_Network_Config:
  Interface: eth0
  AdjustHost: carol
  SweepKey: delay_ms
  SweepValues: [1, 20, 50, 100, 200]
  Profile:
    delay_ms: ""
    jitter_ms: ""
    loss_pct: ""
    duplicate_pct: ""
    corrupt_pct: ""
    reorder_pct: ""
    reorder_corr_pct: ""
    rate_kbit: ""
  AddParams: ""

